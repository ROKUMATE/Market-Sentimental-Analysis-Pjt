  /api/fetcher/refresh:
    post:
      tags: [Fetcher]
      summary: Trigger an immediate fetch cycle in the worker
      description: |
        Dispatches a `trigger-fetch` job to `fetcher-control-queue` (BullMQ).
        The worker's `FetcherRefreshWorker` picks it up and calls `fetcherService.poll()` immediately.
        Only fetches tweets **newer than `lastFetchedAt`** per channel — no duplicate ingestion.

        **Flow:**
        ```
        POST /api/fetcher/refresh
                │
                ▼  enqueues job
          fetcher-control-queue (BullMQ)
                │
                ▼  FetcherRefreshWorker
          fetcherService.poll()  →  Twitter API  →  post-queue  →  PostWorker  →  ...
        ```
      operationId: fetcherRefresh
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Fetch job dispatched to worker
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FetcherRefreshResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/fetcher/status:
    get:
      tags: [Fetcher]
      summary: Get last fetch time per channel (HTTP server process state)
      operationId: fetcherStatus
